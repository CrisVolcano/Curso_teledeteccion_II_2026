<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GF0662 Teledetección UCR</title>
    <style>
      :root {
        color-scheme: light;
        --white: #ffffff;
        --gold: #efc15c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--white);
        background: #17201c;
      }

      .hero {
        min-height: 100vh;
        display: grid;
        align-items: center;
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(10, 16, 14, .78) 0%, rgba(10, 16, 14, .48) 44%, rgba(10, 16, 14, .08) 100%),
          linear-gradient(0deg, rgba(10, 16, 14, .42), rgba(10, 16, 14, .18)),
          url("assets/russia_ice_oli_20250616.jpg") center / cover no-repeat;
      }

      .nav {
        position: absolute;
        inset: 0 0 auto;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: center;
        padding: 1rem clamp(1rem, 4vw, 4rem);
        font-weight: 800;
        text-shadow: 0 2px 18px rgba(0, 0, 0, .55);
      }

      .nav small {
        color: rgba(255, 255, 255, .86);
        font-weight: 700;
      }

      .hero-content {
        width: min(1120px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 7rem 0 5rem;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: .55rem;
        margin: 0 0 1.1rem;
        font-size: .88rem;
        font-weight: 900;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: #ffe6a9;
        text-shadow: 0 2px 18px rgba(0, 0, 0, .6);
      }

      .pulse {
        width: .72rem;
        height: .72rem;
        border-radius: 999px;
        background: var(--gold);
        box-shadow: 0 0 0 .42rem rgba(239, 193, 92, .2);
      }

      h1 {
        max-width: 960px;
        margin: 0;
        font-size: clamp(3rem, 7.4vw, 7rem);
        line-height: .94;
        letter-spacing: 0;
        text-shadow: 0 4px 26px rgba(0, 0, 0, .42);
      }

      .intro {
        max-width: 720px;
        margin: 1.35rem 0 0;
        font-size: clamp(1.05rem, 2vw, 1.35rem);
        color: rgba(255, 255, 255, .92);
        text-shadow: 0 2px 16px rgba(0, 0, 0, .62);
      }

      @media (max-width: 820px) {
        .hero {
          background-position: 58% center;
        }

        .nav {
          align-items: start;
          flex-direction: column;
        }

        .hero-content {
          padding-top: 8rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <nav class="nav" aria-label="Principal">
        <span>GF0662 Teledetección UCR</span>
        <small>Curso 2026</small>
      </nav>
      <div class="hero-content">
        <p class="eyebrow"><span class="pulse"></span> Universidad de Costa Rica</p>
        <h1>Teledetección para mirar el territorio con datos</h1>
        <p class="intro">
          Materiales, lecturas y recursos de laboratorio para acompañar el aprendizaje de sensores remotos, imágenes satelitales y análisis espacial.
        </p>
      </div>
    </header>
  </body>
</html>
